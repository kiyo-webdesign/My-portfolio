<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header lightgreen-section">
       <div class="header-menu">
        <img class="my-portfolio-logo" src="images/My Portfolio.svg" alt="マイポートフォリオロゴ">
        <nav class="gnav">
         <ul>
           <li><a href="index.html">HOME</a></li>
           <li><a href="works.html">経歴・スキル</a></li>
           <li><a href="hobby.html">特技・趣味</a></li>
           <li><a href="contact.html">お問い合わせはこちら</a></li>
         </ul>
        </nav>
        </div>
    
</header>
<main class="main lightgreen-section">
<section>
            <img class="main-visual" src="images/main visual_contact.png" alt="お問い合わせフォームページのメインビジュアル">

</section>
<section class="contents-area">     
            <div class="home-contact-form">
                <div>
                    <p>HOME＞お問い合わせフォーム</p>
                <div/>       
            <h2 class="contact-form">情報を入力してください</h2>
            <form class="contact-form-area">
                <table>
                    <tbody>
                        <tr>
                            <th>
                              <label for="name">お名前</label>
                            </th>
                            <td>
                              <input type="text" id="name" name="name">
                            </td>
                        </tr>
                        <tr>
                            <th>
                               <label for="email">E-mail</label>
                            </th>
                            <td>
                              <input type="mail" id="email" name="email">
                            </td>
                        </tr>
                        <tr>
                            <th>
                              <label for="tel">TEL</label>
                            </th>
                            <td>
                              <input type="tel" id="tel" name="tel">
                            </td>
                        </tr>
                        <tr>
                            <th>
                              <label for="massage">ご質問など</label>
                            </th>
                            <td class="massage-area">
                              <textarea id="massage" name="massage"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                             <div class="sousin-button">
                              <button type="button" value="送信する">送信する</button>
                             </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </form>
</section>
</main>
<footer class="footer green-section">
   <div class="footer-area">
       <div class="footer-icon-logo">
        <img src="images/Yamamoto Kiyomi logo.svg" alt="自分の名前のロゴ">
        <div class="instagram-x-icons">
            <div class="instagram-x-icons2">
                <img src="images/instagram icon.svg" alt="インスタグラムアイコン">
                <p>Instagram</p>
            </div>
            <div class="instagram-x-icons2">
                <img src="images/x-twitter-logo.svg" alt="Xアイコン">
                <p>X</p>
            </div>
        </div>
       </div>
        <ul class="footer-menu">
            <div class="footer-menu-text">
                <li><a href="index.html">HOME</a></li>
                <li><a href="works.html">Career & Skill</a></li>
            </div>
            <div class="footer-menu-text">
                <li><a href="hobby.html">Special skills &<br>hobby</a></li>
                <li><a href="contact.html">Contact form</a></li>
            </div>
        </ul>
   </div>
